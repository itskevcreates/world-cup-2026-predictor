# Brings up the whole platform: PostgreSQL + FastAPI backend + Next.js frontend.
#   docker compose up --build
# Then: frontend http://localhost:3000  ·  API http://localhost:8000/docs
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
      POSTGRES_DB: worldcup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://worldcup:worldcup@db:5432/worldcup
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # load the real teams/standings into Postgres, then start the API
    command: >
      sh -c "python -m app.db.load &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend-next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
